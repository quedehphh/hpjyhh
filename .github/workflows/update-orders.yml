name: 更新点单数据

on:
  workflow_dispatch:
    inputs:
      action:
        description: '操作类型 (register/login/add_item/remove_item/add_to_cart/submit_order/approve_user/reject_user/delete_user/update_order_status/add_product/remove_product)'
        required: true
        type: string
      user_data:
        description: '用户数据 JSON'
        required: false
        type: string
      order_data:
        description: '订单数据 JSON'
        required: false
        type: string
      item_data:
        description: '商品数据 JSON'
        required: false
        type: string
      target_id:
        description: '目标ID (用于状态更新/删除等操作)'
        required: false
        type: string
      username:
        description: '用户名'
        required: false
        type: string
      password:
        description: '密码'
        required: false
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: 处理数据
        run: |
          ACTION="${{ github.event.inputs.action }}"
          USER_DATA='${{ github.event.inputs.user_data }}'
          ORDER_DATA='${{ github.event.inputs.order_data }}'
          ITEM_DATA='${{ github.event.inputs.item_data }}'
          TARGET_ID="${{ github.event.inputs.target_id }}"
          USERNAME="${{ github.event.inputs.username }}"
          PASSWORD="${{ github.event.inputs.password }}"

          echo "操作: $ACTION"

          # 确保 data.json 存在
          if [ ! -f data.json ]; then
            echo '{"users":[],"products":[],"orders":[],"carts":{}}' > data.json
          fi

          # 使用 Python 处理 JSON
          python3 << EOF
          import json, sys
          from datetime import datetime

          with open('data.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          action = '$ACTION'
          user_data_str = '''$USER_DATA'''
          order_data_str = '''$ORDER_DATA'''
          item_data_str = '''$ITEM_DATA'''
          target_id = '$TARGET_ID'
          username = '$USERNAME'
          password = '$PASSWORD'

          if action == 'register':
              new_user = json.loads(user_data_str)
              # 检查用户名是否已存在
              if any(u['username'] == new_user['username'] for u in data['users']):
                  print(f"用户名已存在: {new_user['username']}")
              else:
                  new_user['status'] = 'pending'  # 需要管理员审核
                  new_user['userId'] = f"user_{len(data['users']) + 1}"
                  data['users'].append(new_user)
                  print(f"注册申请已提交: {new_user['username']}")

          elif action == 'login':
              # 验证登录（这里只是记录，实际验证在前端）
              print(f"用户登录验证: {username}")

          elif action == 'add_to_cart':
              cart_data = json.loads(item_data_str)
              user_id = cart_data.get('userId')
              product_id = cart_data.get('productId')
              quantity = cart_data.get('quantity', 1)
              
              if user_id not in data['carts']:
                  data['carts'][user_id] = []
              
              # 查找商品信息
              product = next((p for p in data['products'] if p['productId'] == product_id and p['status'] == 'active'), None)
              if not product:
                  print(f"商品不存在或已下架: {product_id}")
              else:
                  # 检查购物车中是否已有此商品
                  existing = next((item for item in data['carts'][user_id] if item['productId'] == product_id), None)
                  if existing:
                      existing['quantity'] += quantity
                  else:
                      data['carts'][user_id].append({
                          'productId': product_id,
                          'productName': product['name'],
                          'price': product['price'],
                          'quantity': quantity
                      })
                  print(f"已添加 {product['name']} x{quantity} 到购物车")

          elif action == 'remove_from_cart':
              cart_data = json.loads(item_data_str)
              user_id = cart_data.get('userId')
              product_id = cart_data.get('productId')
              
              if user_id in data['carts']:
                  data['carts'][user_id] = [item for item in data['carts'][user_id] if item['productId'] != product_id]
                  print(f"已从购物车移除商品: {product_id}")

          elif action == 'submit_order':
              order_info = json.loads(order_data_str)
              user_id = order_info.get('userId')
              
              if user_id in data['carts'] and data['carts'][user_id]:
                  new_order = {
                      'orderId': f"order_{len(data['orders']) + 1}",
                      'userId': user_id,
                      'username': order_info.get('username'),
                      'items': data['carts'][user_id].copy(),
                      'totalAmount': sum(item['price'] * item['quantity'] for item in data['carts'][user_id]),
                      'status': '已下单',
                      'orderTime': datetime.now().isoformat()
                  }
                  data['orders'].append(new_order)
                  data['carts'][user_id] = []  # 清空购物车
                  print(f"订单已提交: {new_order['orderId']}")
              else:
                  print("购物车为空，无法提交订单")

          elif action == 'update_order_status':
              order_id = target_id
              new_status = order_data_str
              
              for order in data['orders']:
                  if order['orderId'] == order_id:
                      order['status'] = new_status
                      print(f"订单 {order_id} 状态已更新为: {new_status}")
                      break

          elif action == 'approve_user':
              user_id = target_id
              for user in data['users']:
                  if user['userId'] == user_id:
                      user['status'] = 'approved'
                      print(f"用户审核通过: {user['username']}")
                      break

          elif action == 'reject_user':
              user_id = target_id
              data['users'] = [u for u in data['users'] if u['userId'] != user_id]
              print(f"已拒绝并删除用户: {user_id}")

          elif action == 'delete_user':
              user_id = target_id
              data['users'] = [u for u in data['users'] if u['userId'] != user_id]
              # 同时清理该用户的购物车和订单
              if user_id in data['carts']:
                  del data['carts'][user_id]
              data['orders'] = [o for o in data['orders'] if o['userId'] != user_id]
              print(f"已删除用户及相关数据: {user_id}")

          elif action == 'add_product':
              product_info = json.loads(item_data_str)
              product_info['productId'] = f"prod_{len(data['products']) + 1}"
              product_info['status'] = 'active'
              data['products'].append(product_info)
              print(f"商品已上架: {product_info['name']}")

          elif action == 'remove_product':
              product_id = target_id
              for product in data['products']:
                  if product['productId'] == product_id:
                      product['status'] = 'inactive'
                      print(f"商品已下架: {product['name']}")
                      break

          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          EOF

      - name: 提交更改
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "📝 点单系统数据更新 - ${{ github.event.inputs.action }}"
          git push
