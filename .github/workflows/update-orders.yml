name: 更新点单数据

on:
  workflow_dispatch:
    inputs:
      action:
        description: '操作类型 (register/login/add_item/remove_item/add_to_cart/submit_order/approve_user/reject_user/delete_user/update_order_status/add_product/remove_product)'
        required: true
        type: string
      user_data:
        description: '用户数据 JSON'
        required: false
        type: string
      order_data:
        description: '订单数据 JSON'
        required: false
        type: string
      item_data:
        description: '商品数据 JSON'
        required: false
        type: string
      target_id:
        description: '目标ID (用于状态更新/删除等操作)'
        required: false
        type: string
      username:
        description: '用户名'
        required: false
        type: string
      password:
        description: '密码'
        required: false
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: 处理数据
        run: |
          ACTION="${{ github.event.inputs.action }}"
          USER_DATA='${{ github.event.inputs.user_data }}'
          ORDER_DATA='${{ github.event.inputs.order_data }}'
          ITEM_DATA='${{ github.event.inputs.item_data }}'
          TARGET_ID="${{ github.event.inputs.target_id }}"
          USERNAME="${{ github.event.inputs.username }}"
          PASSWORD="${{ github.event.inputs.password }}"

          echo "========================================="
          echo "操作类型: $ACTION"
          echo "目标ID: $TARGET_ID"
          echo "用户数据: $USER_DATA"
          echo "商品数据: $ITEM_DATA"
          echo "订单数据: $ORDER_DATA"
          echo "========================================="

          # 确保 data.json 存在，并初始化必要字段
          if [ ! -f data.json ]; then
            echo '{"users":[],"products":[],"orders":[],"carts":{}}' > data.json
            echo "data.json 文件不存在，已创建默认文件"
          fi

          # 使用 Python 处理 JSON
          python3 << EOF
          import json, sys
          from datetime import datetime

          with open('data.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          # 确保所有必要的键存在
          if 'users' not in data:
              data['users'] = []
          if 'products' not in data:
              data['products'] = []
          if 'orders' not in data:
              data['orders'] = []
          if 'carts' not in data:
              data['carts'] = {}

          action = '$ACTION'
          user_data_str = '''$USER_DATA'''
          order_data_str = '''$ORDER_DATA'''
          item_data_str = '''$ITEM_DATA'''
          target_id = '$TARGET_ID'
          username = '$USERNAME'
          password = '$PASSWORD'

          print(f"开始执行操作: {action}")
          print(f"当前数据状态 - 用户: {len(data['users'])}, 商品: {len(data['products'])}, 订单: {len(data['orders'])}")

          # ==================== 用户注册 ====================
          if action == 'register':
              try:
                  new_user = json.loads(user_data_str)
                  print(f"接收到注册数据: {new_user}")
                  
                  # 检查用户名是否已存在
                  if any(u['username'] == new_user['username'] for u in data['users']):
                      print(f"❌ 用户名已存在: {new_user['username']}")
                  else:
                      # 生成用户ID
                      max_id = 0
                      for u in data['users']:
                          if u['userId'].startswith('user_'):
                              try:
                                  num = int(u['userId'].replace('user_', ''))
                                  max_id = max(max_id, num)
                              except:
                                  pass
                      
                      new_user['userId'] = f"user_{max_id + 1}"
                      new_user['status'] = 'pending'  # 需要管理员审核
                      new_user['role'] = new_user.get('role', 'user')
                      
                      data['users'].append(new_user)
                      print(f"✅ 注册申请已提交: {new_user['username']} (ID: {new_user['userId']})")
                      print(f"当前待审核用户数: {len([u for u in data['users'] if u['status'] == 'pending'])}")
              except Exception as e:
                  print(f"❌ 注册失败: {str(e)}")

          # ==================== 用户登录验证（仅记录） ====================
          elif action == 'login':
              print(f"用户登录尝试: {username}")

          # ==================== 添加到购物车 ====================
          elif action == 'add_to_cart':
              try:
                  cart_data = json.loads(item_data_str)
                  user_id = cart_data.get('userId')
                  product_id = cart_data.get('productId')
                  quantity = cart_data.get('quantity', 1)
                  
                  print(f"添加购物车 - 用户: {user_id}, 商品: {product_id}, 数量: {quantity}")
                  
                  # 确保用户的购物车存在
                  if user_id not in data['carts']:
                      data['carts'][user_id] = []
                  
                  # 查找商品信息
                  product = next((p for p in data['products'] if p['productId'] == product_id and p['status'] == 'active'), None)
                  if not product:
                      print(f"❌ 商品不存在或已下架: {product_id}")
                  else:
                      # 检查购物车中是否已有此商品
                      existing = next((item for item in data['carts'][user_id] if item['productId'] == product_id), None)
                      if existing:
                          existing['quantity'] += quantity
                          print(f"✅ 更新数量: {product['name']} x{existing['quantity']}")
                      else:
                          data['carts'][user_id].append({
                              'productId': product_id,
                              'productName': product['name'],
                              'price': product['price'],
                              'quantity': quantity
                          })
                          print(f"✅ 已添加: {product['name']} x{quantity} 到购物车")
              except Exception as e:
                  print(f"❌ 添加到购物车失败: {str(e)}")

          # ==================== 从购物车移除 ====================
          elif action == 'remove_from_cart':
              try:
                  cart_data = json.loads(item_data_str)
                  user_id = cart_data.get('userId')
                  product_id = cart_data.get('productId')
                  
                  print(f"移除购物车 - 用户: {user_id}, 商品: {product_id}")
                  
                  if user_id in data['carts']:
                      before = len(data['carts'][user_id])
                      data['carts'][user_id] = [item for item in data['carts'][user_id] if item['productId'] != product_id]
                      after = len(data['carts'][user_id])
                      print(f"✅ 已从购物车移除商品: {product_id} (从 {before} 件减少到 {after} 件)")
              except Exception as e:
                  print(f"❌ 移除购物车失败: {str(e)}")

          # ==================== 提交订单 ====================
          elif action == 'submit_order':
              try:
                  order_info = json.loads(order_data_str)
                  user_id = order_info.get('userId')
                  
                  print(f"提交订单 - 用户: {user_id}")
                  
                  if user_id in data['carts'] and data['carts'][user_id]:
                      # 生成订单ID
                      order_num = len(data['orders']) + 1
                      
                      new_order = {
                          'orderId': f"order_{order_num}",
                          'userId': user_id,
                          'username': order_info.get('username', '未知用户'),
                          'items': data['carts'][user_id].copy(),
                          'totalAmount': sum(item['price'] * item['quantity'] for item in data['carts'][user_id]),
                          'status': '已下单',
                          'orderTime': datetime.now().isoformat()
                      }
                      data['orders'].append(new_order)
                      data['carts'][user_id] = []  # 清空购物车
                      print(f"✅ 订单已提交: {new_order['orderId']} (总额: ¥{new_order['totalAmount']:.2f})")
                  else:
                      print("❌ 购物车为空，无法提交订单")
              except Exception as e:
                  print(f"❌ 提交订单失败: {str(e)}")

          # ==================== 更新订单状态 ====================
          elif action == 'update_order_status':
              try:
                  order_id = target_id
                  new_status = order_data_str.replace('"', '').strip()
                  
                  print(f"更新订单状态 - 订单: {order_id}, 新状态: {new_status}")
                  
                  found = False
                  for order in data['orders']:
                      if order['orderId'] == order_id:
                          old_status = order['status']
                          order['status'] = new_status
                          found = True
                          print(f"✅ 订单 {order_id} 状态已更新: {old_status} -> {new_status}")
                          break
                  
                  if not found:
                      print(f"❌ 未找到订单: {order_id}")
              except Exception as e:
                  print(f"❌ 更新订单状态失败: {str(e)}")

          # ==================== 审核通过用户 ====================
          elif action == 'approve_user':
              try:
                  user_id = target_id
                  print(f"审核通过用户: {user_id}")
                  
                  found = False
                  for user in data['users']:
                      if user['userId'] == user_id:
                          old_status = user['status']
                          user['status'] = 'approved'
                          found = True
                          print(f"✅ 用户审核通过: {user['username']} ({old_status} -> approved)")
                          break
                  
                  if not found:
                      print(f"❌ 未找到用户: {user_id}")
                  else:
                      print(f"当前已审核用户数: {len([u for u in data['users'] if u['status'] == 'approved'])}")
              except Exception as e:
                  print(f"❌ 审核用户失败: {str(e)}")

          # ==================== 拒绝用户（删除） ====================
          elif action == 'reject_user':
              try:
                  user_id = target_id
                  print(f"拒绝并删除用户: {user_id}")
                  
                  before = len(data['users'])
                  rejected_user = next((u for u in data['users'] if u['userId'] == user_id), None)
                  data['users'] = [u for u in data['users'] if u['userId'] != user_id]
                  after = len(data['users'])
                  
                  if rejected_user:
                      print(f"✅ 已拒绝用户: {rejected_user['username']} (从 {before} 人减少到 {after} 人)")
                  else:
                      print(f"❌ 未找到用户: {user_id}")
              except Exception as e:
                  print(f"❌ 拒绝用户失败: {str(e)}")

          # ==================== 删除用户 ====================
          elif action == 'delete_user':
              try:
                  user_id = target_id
                  print(f"删除用户: {user_id}")
                  
                  before = len(data['users'])
                  deleted_user = next((u for u in data['users'] if u['userId'] == user_id), None)
                  data['users'] = [u for u in data['users'] if u['userId'] != user_id]
                  after = len(data['users'])
                  
                  # 同时清理该用户的购物车和订单
                  if user_id in data['carts']:
                      del data['carts'][user_id]
                      print("已清理用户购物车")
                  data['orders'] = [o for o in data['orders'] if o['userId'] != user_id]
                  print("已清理用户订单")
                  
                  if deleted_user:
                      print(f"✅ 已删除用户: {deleted_user['username']} (从 {before} 人减少到 {after} 人)")
                  else:
                      print(f"❌ 未找到用户: {user_id}")
              except Exception as e:
                  print(f"❌ 删除用户失败: {str(e)}")

          # ==================== 添加商品 ====================
          elif action == 'add_product':
              try:
                  product_info = json.loads(item_data_str)
                  print(f"添加商品: {product_info}")
                  
                  # 生成商品ID
                  max_id = 0
                  for p in data['products']:
                      if p['productId'].startswith('prod_'):
                          try:
                              num = int(p['productId'].replace('prod_', ''))
                              max_id = max(max_id, num)
                          except:
                              pass
                  
                  product_info['productId'] = f"prod_{max_id + 1}"
                  product_info['status'] = 'active'
                  
                  data['products'].append(product_info)
                  print(f"✅ 商品已上架: {product_info['name']} (ID: {product_info['productId']})")
              except Exception as e:
                  print(f"❌ 添加商品失败: {str(e)}")

          # ==================== 下架/上架商品 ====================
          elif action == 'remove_product':
              try:
                  product_id = target_id
                  print(f"切换商品状态: {product_id}")
                  
                  found = False
                  for product in data['products']:
                      if product['productId'] == product_id:
                          old_status = product.get('status', 'active')
                          # 切换状态：active -> inactive, inactive -> active
                          product['status'] = 'inactive' if old_status == 'active' else 'active'
                          found = True
                          print(f"✅ 商品状态已切换: {product['name']} ({old_status} -> {product['status']})")
                          break
                  
                  if not found:
                      print(f"❌ 未找到商品: {product_id}")
              except Exception as e:
                  print(f"❌ 切换商品状态失败: {str(e)}")

          # 保存数据
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          
          print("=========================================")
          print(f"操作完成: {action}")
          print(f"最终数据状态 - 用户: {len(data['users'])}, 商品: {len(data['products'])}, 订单: {len(data['orders'])}")
          print("=========================================")
          EOF

      - name: 提交更改
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "📝 点单系统数据更新 - ${{ github.event.inputs.action }}"
          git push
          echo "✅ 数据已提交到仓库"
